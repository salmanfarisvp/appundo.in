<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with Kerala green -->
  <circle cx="32" cy="32" r="32" fill="#16a34a"/>
  <!-- Coconut palm tree - iconic Kerala symbol -->
  <!-- Trunk -->
  <path d="M30 58 C30 58 28 42 32 30" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Palm leaves -->
  <path d="M32 30 C28 24 20 22 16 24" stroke="#dcfce7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 30 C30 22 26 16 22 14" stroke="#dcfce7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 30 C32 20 34 14 36 10" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 30 C36 22 40 18 44 16" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 30 C38 24 44 24 48 26" stroke="#dcfce7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Coconuts -->
  <circle cx="30" cy="31" r="2.5" fill="#fbbf24"/>
  <circle cx="34" cy="32" r="2.5" fill="#fbbf24"/>
  <!-- Water waves at bottom -->
  <path d="M10 52 C14 50 18 54 22 52 C26 50 30 54 34 52 C38 50 42 54 46 52 C50 50 54 54 58 52" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- App grid dots - representing apps -->
  <circle cx="16" cy="38" r="2" fill="white" opacity="0.8"/>
  <circle cx="22" cy="38" r="2" fill="white" opacity="0.8"/>
  <circle cx="16" cy="44" r="2" fill="white" opacity="0.8"/>
  <circle cx="22" cy="44" r="2" fill="white" opacity="0.8"/>
  <circle cx="42" cy="38" r="2" fill="white" opacity="0.8"/>
  <circle cx="48" cy="38" r="2" fill="white" opacity="0.8"/>
  <circle cx="42" cy="44" r="2" fill="white" opacity="0.8"/>
  <circle cx="48" cy="44" r="2" fill="white" opacity="0.8"/>
</svg>
